services:
  fjordpulse-boon:
    build:
      context: ../..
      dockerfile: deploy/fjordpulse/Dockerfile
      args:
        SOURCE_REVISION: ${SOURCE_REVISION:?set the exact gated source revision}
    environment:
      BOON_PACKAGE_DIR: /opt/boon/app
      BOON_RUN_MODE: live
      BOON_PUBLIC_ORIGIN: https://fjordpulse-boon.kavik.cz
      BOON_DATA_DIR: /var/lib/boon/fjordpulse
      BOON_STATE_NAMESPACE: fjordpulse-server-production-v1
      ENTUR_CLIENT_NAME: ${ENTUR_CLIENT_NAME:?required}
      MAP_TILE_PROVIDER: maptiler
      MAP_TILE_SATELLITE_TEMPLATE: ${MAP_TILE_SATELLITE_TEMPLATE:?required}
      MAP_TILE_STREETS_TEMPLATE: ${MAP_TILE_STREETS_TEMPLATE:?required}
      MAP_TILE_PUBLIC_KEY: ${MAP_TILE_PUBLIC_KEY:?required}
      SESSION_SIGNING_SECRET_REF: ${SESSION_SIGNING_SECRET_REF:?required}
      ADMIN_OPERATOR_ID: ${ADMIN_OPERATOR_ID:?required}
      ADMIN_OPERATOR_SECRET_REF: ${ADMIN_OPERATOR_SECRET_REF:?required}
      ADMIN_DEMO_ACCESS: ${ADMIN_DEMO_ACCESS:-false}
      TRUSTED_PROXY_CIDRS: ${TRUSTED_PROXY_CIDRS:-}
      RUST_LOG: ${RUST_LOG:-info}
    expose:
      - "8080"
    volumes:
      - fjordpulse_data:/var/lib/boon/fjordpulse
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 45s
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/usr/local/bin/boon-app-server", "healthcheck"]
      interval: 10s
      timeout: 3s
      start_period: 30s
      retries: 6

volumes:
  fjordpulse_data:

