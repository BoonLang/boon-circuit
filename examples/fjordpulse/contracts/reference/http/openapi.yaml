openapi: 3.1.0
info:
  title: FjordPulse HTTP API
  version: 1.0.0
  description: |
    Canonical browser-to-FjordPulse HTTP contract. All application API calls use
    these FjordPulse endpoints; Entur and SurrealDB remain backend-only. The one
    approved third-party browser surface is the allowlisted MapTiler style/tile
    configuration returned by GET /api/map/config.

    All timestamps are UTC RFC3339 values. Current state returned by snapshot
    endpoints is authoritative. Realtime notifications are hints to fetch or
    apply a newer version of that state. Development scenario endpoints MUST
    return 404 outside local, development, and test environments.
  contact:
    name: FjordPulse
  license:
    name: UNLICENSED
    identifier: LicenseRef-UNLICENSED
servers:
  - url: /
    description: Same-origin HTTP API in local, staging, or production environments
security: []
tags:
  - name: Health
    description: Public liveness, dependency health, and readiness signals.
  - name: Map
    description: Public, operator-managed browser basemap configuration.
  - name: Stations
    description: Locally stored station map data and authoritative station snapshots.
  - name: Search
    description: Backend-mediated station, place, line, and known-vehicle discovery.
  - name: Vehicles
    description: Authoritative current vehicle state and observed trails.
  - name: Realtime
    description: Short-lived browser authorization for the PHP WebSocket service.
  - name: Admin session
    description: Cookie-based operator and public read-only-demo authentication lifecycle.
  - name: Admin diagnostics
    description: Protected, read-only operational status, watches, events, database structure, migrations, and Entur logs.
  - name: Development
    description: Deterministic local/dev/test scenarios that are absent in production.
paths:
  /api/health:
    get:
      tags: [Health]
      summary: Report service and dependency health
      operationId: getHealth
      responses:
        '200':
          description: Healthy or operational in a degraded fallback mode
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HealthResponse' }
              examples:
                healthy:
                  $ref: '#/components/examples/HealthyResponse'
                degraded:
                  $ref: '#/components/examples/DegradedHealthResponse'
        '429':
          $ref: '#/components/responses/RateLimited'
        '503':
          description: Unhealthy; dependency details remain machine-readable
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HealthResponse' }
  /api/readiness:
    get:
      tags: [Health]
      summary: Report whether the HTTP application can serve authoritative snapshots
      operationId: getReadiness
      responses:
        '200':
          description: The service is ready
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HealthResponse' }
        '429':
          $ref: '#/components/responses/RateLimited'
        '503':
          description: Not ready; dependency details remain machine-readable
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HealthResponse' }
  /api/map/config:
    get:
      tags: [Map]
      summary: Get the allowlisted browser basemap configuration
      operationId: getMapConfig
      responses:
        '200':
          description: MapTiler satellite and street basemaps configured by the operator
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MapConfigResponse' }
        '429':
          $ref: '#/components/responses/RateLimited'
        '503':
          description: The operator has not configured the map provider
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
  /api/stations:
    get:
      tags: [Stations]
      summary: List bounded station markers or clusters for a map viewport
      operationId: getStationMap
      parameters:
        - $ref: '#/components/parameters/BoundingBox'
        - $ref: '#/components/parameters/Zoom'
      responses:
        '200':
          description: Station markers or clusters sourced from local canonical data
          content:
            application/json:
              schema: { $ref: '#/components/schemas/StationMapResponse' }
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/RateLimited'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /api/search:
    get:
      tags: [Search]
      summary: Search stations, places, lines, and known vehicles
      operationId: search
      parameters:
        - name: q
          in: query
          required: true
          description: User-entered search query
          schema: { type: string, minLength: 1, maxLength: 200 }
          example: førde
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 50, default: 20 }
      responses:
        '200':
          description: Ordered search results; an empty array is not an error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SearchResponse' }
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/RateLimited'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /api/stations/{stationId}:
    get:
      tags: [Stations]
      summary: Get station metadata and its authoritative current snapshot
      operationId: getStation
      parameters:
        - $ref: '#/components/parameters/StationId'
        - $ref: '#/components/parameters/Refresh'
      responses:
        '200':
          description: Station metadata and current composite snapshot
          content:
            application/json:
              schema: { $ref: '#/components/schemas/StationResponse' }
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimited'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /api/stations/{stationId}/departures:
    get:
      tags: [Stations]
      summary: Get the compact departure preview or an on-demand Oslo-local daily timetable page
      operationId: getStationDepartures
      parameters:
        - $ref: '#/components/parameters/StationId'
        - name: date
          in: query
          required: false
          description: When present, return this Europe/Oslo calendar day's cached timetable instead of the realtime preview; accepted dates are today through seven days ahead.
          schema: { type: string, format: date }
        - name: limit
          in: query
          required: false
          description: Daily-timetable page size; requires `date` and is not accepted for the compact preview.
          schema: { type: integer, minimum: 1, maximum: 50, default: 50 }
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Refresh'
      responses:
        '200':
          description: Bounded preview or stable page from one versioned daily timetable, including explicit completeness
          content:
            application/json:
              schema: { $ref: '#/components/schemas/StationDeparturesResponse' }
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimited'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /api/stations/{stationId}/nearby-vehicles:
    get:
      tags: [Stations]
      summary: Get vehicle state within the station's circular search radius
      operationId: getStationNearbyVehicles
      parameters:
        - $ref: '#/components/parameters/StationId'
      responses:
        '200':
          description: Nearest-first vehicles within the reported search radius; an empty array is a successful empty state
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NearbyVehiclesResponse' }
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimited'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /api/vehicles/{vehicleId}:
    get:
      tags: [Vehicles]
      summary: Get authoritative vehicle state, scheduled journey, upcoming calls, and bounded observed trail
      operationId: getVehicle
      parameters:
        - $ref: '#/components/parameters/VehicleId'
        - $ref: '#/components/parameters/Refresh'
      responses:
        '200':
          description: Current vehicle state, full scheduled journey geometry/calls, recent observations, and upcoming stops
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VehicleResponse' }
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimited'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /api/realtime-token:
    post:
      tags: [Realtime]
      summary: Mint a short-lived token for the browser WebSocket endpoint
      operationId: createRealtimeToken
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                clientId:
                  type: string
                  minLength: 1
                  maxLength: 128
                  description: Optional random non-identifying browser session id
              additionalProperties: false
      responses:
        '201':
          description: Short-lived, scope-limited realtime token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RealtimeTokenResponse' }
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/RateLimited'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /api/admin/demo-credentials:
    get:
      tags: [Admin session]
      summary: Discover the deliberately public, read-only Admin demo identity
      description: Returns credentials only when public Admin demo access is explicitly enabled. These credentials are separate from the operator account and sessions created with them are server-enforced as read-only.
      operationId: getAdminDemoCredentials
      responses:
        '200':
          description: Public Admin demo availability and, when enabled, its intentionally public credentials
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminDemoCredentialsResponse' }
        '429':
          $ref: '#/components/responses/RateLimited'
  /api/admin/session:
    get:
      tags: [Admin session]
      summary: Inspect the current admin session
      operationId: getAdminSession
      security: [{ adminSession: [] }]
      responses:
        '200':
          description: Authenticated admin session
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminSessionResponse' }
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Admin session]
      summary: Create an admin session
      operationId: createAdminSession
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AdminLoginRequest' }
      responses:
        '200':
          description: Authenticated admin session; response sets an HttpOnly cookie
          headers:
            Set-Cookie:
              schema: { type: string }
              description: HttpOnly, SameSite, Secure-in-production admin session cookie
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminSessionResponse' }
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
    delete:
      tags: [Admin session]
      summary: Destroy the current admin session
      operationId: deleteAdminSession
      security: [{ adminSession: [] }]
      responses:
        '204':
          description: Session destroyed
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/admin/status:
    get:
      tags: [Admin diagnostics]
      summary: Get operator health, infrastructure, and compatibility diagnostics
      operationId: getAdminStatus
      security: [{ adminSession: [] }]
      responses:
        '200':
          description: Operator status
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminStatusResponse' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /api/admin/watches:
    get:
      tags: [Admin diagnostics]
      summary: List active and recently expired demand watches
      operationId: getAdminWatches
      security: [{ adminSession: [] }]
      parameters:
        - name: type
          in: query
          schema: { $ref: '#/components/schemas/WatchType' }
        - name: state
          in: query
          schema: { $ref: '#/components/schemas/WatchState' }
        - name: scope
          in: query
          schema: { type: string, minLength: 1, maxLength: 256 }
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Filtered watch rows
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminWatchesResponse' }
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/admin/entur-log:
    get:
      tags: [Admin diagnostics]
      summary: List structured backend-only Entur request records
      operationId: getAdminEnturLog
      security: [{ adminSession: [] }]
      parameters:
        - name: service
          in: query
          schema: { $ref: '#/components/schemas/EnturService' }
        - name: outcome
          in: query
          schema: { $ref: '#/components/schemas/EnturOutcome' }
        - name: scope
          in: query
          schema: { type: string, minLength: 1, maxLength: 256 }
        - name: from
          in: query
          schema: { type: string, format: date-time }
        - name: to
          in: query
          schema: { type: string, format: date-time }
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Filtered Entur request log rows and aggregate metrics
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminEnturLogResponse' }
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/admin/realtime:
    get:
      tags: [Admin diagnostics]
      summary: Get realtime server, room, and live-query bridge diagnostics
      operationId: getAdminRealtime
      security: [{ adminSession: [] }]
      responses:
        '200':
          description: Realtime diagnostics
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminRealtimeResponse' }
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/admin/events:
    get:
      tags: [Admin diagnostics]
      summary: List recent persisted realtime events
      operationId: getAdminEvents
      security: [{ adminSession: [] }]
      parameters:
        - name: scope
          in: query
          schema: { type: string, minLength: 1, maxLength: 256 }
        - name: type
          in: query
          schema: { $ref: '#/components/schemas/RealtimeEventType' }
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Recent persisted event records
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminEventsResponse' }
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/admin/migrations:
    get:
      tags: [Admin diagnostics]
      summary: List SurrealDB migration compatibility diagnostics (legacy alias)
      description: |
        Compatibility alias for `GET /api/admin/database/migrations`. This
        protected endpoint is read-only and cannot execute, retry, edit, or
        roll back a migration.
      operationId: getAdminMigrations
      deprecated: true
      security: [{ adminSession: [] }]
      responses:
        '200':
          description: Read-only release/database migration compatibility
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminDatabaseMigrationsResponse' }
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/admin/database/schema:
    get:
      tags: [Admin diagnostics]
      summary: Inspect the current allowlisted SurrealDB schema structure
      description: |
        Returns a typed, read-only mapping of one fixed, backend-owned,
        allowlisted SurrealDB `INFO ... STRUCTURE` query. The browser never connects to
        SurrealDB and cannot submit SurrealQL. Raw INFO results are not returned;
        users, credentials, password hashes, authentication definitions, and
        any other non-allowlisted metadata are discarded inside the backend.
      operationId: getAdminDatabaseSchema
      security: [{ adminSession: [] }]
      responses:
        '200':
          description: Read-only current table, field, index, event, and permission structure
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminDatabaseSchemaResponse' }
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/admin/database/migrations:
    get:
      tags: [Admin diagnostics]
      summary: Inspect SurrealDB release/database migration compatibility
      description: |
        Compares the bundled, allowlisted release migration files with the
        migration ledger and migration-attempt audit records. Source is read
        only and comes only from discovered bundled migration files; no path or
        query parameter is accepted. The endpoint cannot execute, retry, edit,
        or roll back migrations.
      operationId: getAdminDatabaseMigrations
      security: [{ adminSession: [] }]
      responses:
        '200':
          description: Read-only release/database migration compatibility
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminDatabaseMigrationsResponse' }
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/dev/scenario:
    get:
      tags: [Development]
      summary: Get the current deterministic scenario
      description: Returns 404 when development endpoints are disabled.
      operationId: getDevScenario
      responses:
        '200':
          description: Current scenario
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DevScenarioResponse' }
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [Development]
      summary: Select a deterministic scenario
      description: Returns 404 when development endpoints are disabled.
      operationId: setDevScenario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [scenario]
              properties:
                scenario: { $ref: '#/components/schemas/DevScenario' }
              additionalProperties: false
      responses:
        '200':
          description: Scenario selected
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DevScenarioResponse' }
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/dev/scenarios:
    get:
      tags: [Development]
      summary: List deterministic scenarios supported by the final adapter interfaces
      description: Returns 404 when development endpoints are disabled.
      operationId: getDevScenarios
      responses:
        '200':
          description: Available scenarios
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DevScenariosResponse' }
        '404':
          $ref: '#/components/responses/NotFound'
components:
  securitySchemes:
    adminSession:
      type: apiKey
      in: cookie
      name: fjordpulse_admin
      description: HttpOnly admin session cookie; not readable by browser JavaScript.
  parameters:
    StationId:
      name: stationId
      in: path
      required: true
      schema:
        type: string
        pattern: '^NSR:StopPlace:[A-Za-z0-9_-]+$'
        maxLength: 200
      example: NSR:StopPlace:548
    VehicleId:
      name: vehicleId
      in: path
      required: true
      schema:
        type: string
        pattern: '^[A-Za-z0-9][A-Za-z0-9:._-]{0,199}$'
      example: SKY:Vehicle:12345
    BoundingBox:
      name: bbox
      in: query
      required: true
      description: minLongitude,minLatitude,maxLongitude,maxLatitude in WGS84
      schema:
        type: string
        pattern: '^-?[0-9]+(?:\.[0-9]+)?,-?[0-9]+(?:\.[0-9]+)?,-?[0-9]+(?:\.[0-9]+)?,-?[0-9]+(?:\.[0-9]+)?$'
        maxLength: 128
      example: 4.5,58.0,8.5,63.0
    Zoom:
      name: zoom
      in: query
      required: true
      schema: { type: number, minimum: 0, maximum: 24 }
      example: 7.5
    Limit:
      name: limit
      in: query
      required: false
      schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
    Cursor:
      name: cursor
      in: query
      required: false
      schema: { type: string, minLength: 1, maxLength: 512, pattern: '^[A-Za-z0-9_-]+$' }
    Refresh:
      name: refresh
      in: query
      required: false
      description: Force an upstream refresh before returning authoritative data. For a daily timetable this requires `date` and cannot be combined with `cursor`.
      schema: { type: boolean, default: false }
  responses:
    BadRequest:
      description: Request validation failed
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
          example:
            ok: false
            error:
              code: invalid_request
              message: Request parameters are invalid.
              details: { field: bbox }
            meta: { requestId: req_01J00000000000000000000000 }
    Unauthorized:
      description: Authentication is required or invalid
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    NotFound:
      description: Resource does not exist or is intentionally unavailable in this environment
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    RateLimited:
      description: Public action rate limit reached
      headers:
        Retry-After:
          schema: { type: integer, minimum: 1 }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    ServiceUnavailable:
      description: An authoritative dependency is unavailable
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
  examples:
    HealthyResponse:
      value:
        ok: true
        data:
          status: healthy
          mode: normal
          dataMode: real
          checkedAt: '2026-07-10T10:00:00Z'
          version: 1.0.0-dev
          fallbackAvailable: true
          dependencies:
            http: { status: healthy, checkedAt: '2026-07-10T10:00:00Z' }
            realtime: { status: healthy, checkedAt: '2026-07-10T10:00:00Z' }
            surrealdb: { status: healthy, checkedAt: '2026-07-10T10:00:00Z' }
            entur: { status: healthy, checkedAt: '2026-07-10T10:00:00Z' }
            mapTiles: { status: configured, checkedAt: '2026-07-10T10:00:00Z' }
            liveQueryBridge:
              status: healthy
              checkedAt: '2026-07-10T10:00:00Z'
              lastSuccessAt: '2026-07-10T09:59:58Z'
        meta:
          requestId: req_01J00000000000000000000000
          updatedAt: '2026-07-10T10:00:00Z'
    DegradedHealthResponse:
      value:
        ok: true
        data:
          status: degraded
          mode: fallback_polling
          dataMode: real
          checkedAt: '2026-07-10T10:00:00Z'
          version: 1.0.0-dev
          fallbackAvailable: true
          dependencies:
            http: { status: healthy, checkedAt: '2026-07-10T10:00:00Z' }
            realtime: { status: unavailable, checkedAt: '2026-07-10T10:00:00Z' }
            surrealdb: { status: healthy, checkedAt: '2026-07-10T10:00:00Z' }
            entur: { status: healthy, checkedAt: '2026-07-10T10:00:00Z' }
            mapTiles: { status: misconfigured, checkedAt: '2026-07-10T10:00:00Z' }
            liveQueryBridge: { status: reconnecting, checkedAt: '2026-07-10T10:00:00Z' }
        meta:
          requestId: req_01J00000000000000000000000
          updatedAt: '2026-07-10T10:00:00Z'
  schemas:
    RequestId:
      type: string
      minLength: 1
      maxLength: 128
      example: req_01J00000000000000000000000
    EntityVersion:
      type: string
      format: date-time
      description: Monotonic-per-entity UTC RFC3339 version used to reject old updates.
      example: '2026-07-10T10:00:00.123456Z'
    SuccessMeta:
      type: object
      required: [requestId, updatedAt]
      properties:
        requestId: { $ref: '#/components/schemas/RequestId' }
        updatedAt: { type: string, format: date-time }
        nextCursor: { type: [string, 'null'], maxLength: 512, pattern: '^[A-Za-z0-9_-]+$' }
      additionalProperties: false
    ErrorMeta:
      type: object
      required: [requestId]
      properties:
        requestId: { $ref: '#/components/schemas/RequestId' }
        retryAfterSeconds: { type: [integer, 'null'], minimum: 0 }
      additionalProperties: false
    ErrorBody:
      type: object
      required: [code, message, details]
      properties:
        code:
          type: string
          minLength: 1
          maxLength: 100
          example: invalid_station
        message:
          type: string
          minLength: 1
          maxLength: 500
          example: Station id is invalid.
        details:
          type: object
          additionalProperties: true
      additionalProperties: false
    ErrorResponse:
      type: object
      required: [ok, error, meta]
      properties:
        ok: { const: false }
        error: { $ref: '#/components/schemas/ErrorBody' }
        meta: { $ref: '#/components/schemas/ErrorMeta' }
      additionalProperties: false
    SourceState:
      type: string
      enum: [loading, fresh, refreshing, empty, stale, unavailable, error, backoff, rate_limited]
    ServiceHealthState:
      type: string
      enum: [healthy, configured, degraded, reconnecting, unavailable, misconfigured, unknown]
    ServiceHealth:
      type: object
      required: [status, checkedAt]
      properties:
