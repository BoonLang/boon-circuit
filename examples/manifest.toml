  "edit-a0-literal",
  "commit-a0-literal",
  "edit-a0-cancel-draft",
  "cancel-a0-draft",
  "commit-b0-formula",
  "change-a0-updates-b0",
  "cycle-error",
  "replace-b0-formula-removes-stale-cycle-edge",
  "change-a0-after-edge-replacement-does-not-recompute-b0",
  "commit-c0-fanout-formula",
  "commit-d0-fanout-formula",
  "commit-j0-visible-grid-edge",
  "change-a0-fanout-recomputes-dependents-only",
]
scroll_focus_scenarios = [
  "vertical-wheel-scroll",
  "horizontal-wheel-scroll",
  "shift-wheel-horizontal-scroll",
  "headers-align-during-scroll",
]
visual_artifacts = [
  "preview-app-owned-framebuffer-before-after",
  "dev-app-owned-framebuffer",
  "focused-cell-crop",
  "formula-bar-crop",
]
performance_thresholds = [
  "preview-scroll-p95-frame-ms <= 16.7",
  "preview-scroll-p99-frame-ms <= 25.0",
  "dev-editor-scroll-p95-frame-ms <= 16.7",
  "logical-grid-cells >= 2600",
]

