[[example]]
id = "cells"
label = "Cells"
source = "examples/cells.bn"
scenario = "examples/cells.scn"
budget = "examples/cells.budget.toml"
category = "7gui"
order = 10
default_tab_order = 10
shown_by_default = true
required_evidence_tier = "real-window"
human_testing_needed = true
initial_visible_assertions = [
  "grid-visible",
  "row-headers-visible",
  "column-headers-visible",
  "seeded-demo-data-visible",
  "empty-cells-blank",
  "focused-cell-style-visible",
  "formula-bar-visible",
  "dev-window-editor-visible",
  "no-large-blank-regions",
]
input_scenarios = [
  "focus-cell",
  "type-scalar-value",
  "commit-value-enter",
  "edit-formula-bar",
  "commit-formula-enter",
  "recompute-dependents",
  "invalid-formula-error",
  "cycle-error",
  "cancel-edit-escape",
  "blur-commit-or-cancel",
]
scroll_focus_scenarios = [
  "vertical-wheel-scroll",
  "horizontal-wheel-scroll",
  "shift-wheel-horizontal-scroll",
  "headers-align-during-scroll",
]
visual_artifacts = [
  "preview-app-owned-framebuffer-before-after",
  "dev-app-owned-framebuffer",
  "focused-cell-crop",
  "formula-bar-crop",
]
performance_thresholds = [
  "preview-scroll-p95-frame-ms <= 16.7",
  "preview-scroll-p99-frame-ms <= 25.0",
  "dev-editor-scroll-p95-frame-ms <= 16.7",
  "logical-grid-cells >= 2600",
]

