format = 1
assets = [
  { source = "../../examples/fjordpulse/assets/fjordpulse-mark.svg", target = "assets/fjordpulse-mark.svg", cache = "immutable" },
]
fixtures = [
  { source = "../../examples/fjordpulse/traceability/parity_manifest.json", target = "fixtures/parity_manifest.json" },
  { source = "../../examples/fjordpulse/traceability/compatibility_delta_ledger.json", target = "fixtures/compatibility_delta_ledger.json" },
  { source = "../../examples/fjordpulse/contracts/reference/traceability.json", target = "fixtures/reference_traceability.json" },
]
migrations = [
  { source = "migrations/catalog.toml", target = "migrations/catalog.toml" },
]
scenarios = [
  { source = "../../examples/fjordpulse.scn", target = "scenarios/fjordpulse.scn" },
]
budgets = [
  { source = "../../examples/fjordpulse.budget.toml", target = "budgets/fjordpulse.toml" },
]

[package]
id = "cz.kavik.fjordpulse"
version = "1.0.0"
deployment_domain = "fjordpulse-boon.kavik.cz"
protocol_version = 1
modes = ["deterministic", "live"]

[programs.document]
role = "document"
entry = "../../examples/fjordpulse/Client/RUN.bn"
sources = [
  "../../examples/fjordpulse/Shared/FjordPulseContract.bn",
  "../../examples/fjordpulse/Theme/FjordPulseTheme.bn",
  "../../examples/fjordpulse/Model/FjordPulseModel.bn",
  "../../examples/fjordpulse/View/FjordPulseComponents.bn",
  "../../examples/fjordpulse/View/FjordPulseMap.bn",
  "../../examples/fjordpulse/View/FjordPulseView.bn",
  "../../examples/fjordpulse/Client/RUN.bn",
]
artifact = "artifacts/document.boon"
target_profile = "software_bounded"
capability_profile = "public_document"
capability_profile_id = "fjordpulse-public-webgpu-v1"
protocol_version = 1

[programs.document.namespaces]
deterministic = "fjordpulse-client-deterministic-v1"
staging = "fjordpulse-client-staging-v1"
production = "fjordpulse-client-production-v1"

[programs.server]
role = "server"
entry = "../../examples/fjordpulse/Server/RUN.bn"
sources = [
  "../../examples/fjordpulse/Shared/FjordPulseContract.bn",
  "../../examples/fjordpulse/Server/RUN.bn",
]
artifact = "artifacts/server.boon"
target_profile = "software_bounded"
capability_profile = "trusted_server"
capability_profile_id = "fjordpulse-trusted-server-v1"
protocol_version = 1

[programs.server.namespaces]
deterministic = "fjordpulse-server-deterministic-v1"
staging = "fjordpulse-server-staging-v1"
production = "fjordpulse-server-production-v1"

[capability_profiles."fjordpulse-public-webgpu-v1"]
id = "fjordpulse-public-webgpu-v1"
role = "document"
grants = [
  "browser.webgpu",
  "browser.same-origin-http",
  "browser.same-origin-websocket",
  "browser.indexeddb",
  "browser.history",
  "browser.accessibility",
  "map.raster-tiles",
]

[capability_profiles."fjordpulse-trusted-server-v1"]
id = "fjordpulse-trusted-server-v1"
role = "server"
grants = [
  "server.http",
  "server.websocket",
  "server.outbound-https",
  "host.clock",
  "host.timers",
  "host.secure-random",
  "host.secret-store",
  "host.hmac-sha256",
  "persistence.redb",
]

[browser]
title = "FjordPulse"
canvas_id = "boon-canvas"
wasm_output_name = "boon_web_host"

[http]
program_path_prefixes = ["api", "ws"]
health_path = "/api/health"
readiness_path = "/api/readiness"
spa_fallback = true

[[environment]]
name = "BOON_RUN_MODE"
kind = "choice"
required_modes = ["deterministic", "live"]
allowed_values = ["deterministic", "live"]
redaction = "public"
description = "Explicit deterministic or live execution mode."

[[environment]]
name = "BOON_PUBLIC_ORIGIN"
kind = "origin"
required_modes = ["deterministic", "live"]
redaction = "public"
description = "Canonical browser-visible origin for URL, cookie, CORS, and WebSocket policy."

[[environment]]
name = "BOON_DATA_DIR"
kind = "text"
required_modes = ["deterministic", "live"]
redaction = "public"
description = "Absolute writable data directory mounted by the production host."

[[environment]]
name = "BOON_STATE_NAMESPACE"
kind = "text"
required_modes = ["deterministic", "live"]
redaction = "public"
description = "Exact state namespace embedded in the selected Server artifact."

[[environment]]
name = "ENTUR_CLIENT_NAME"
kind = "text"
required_modes = ["live"]
redaction = "public"
description = "Entur client identity sent by the named outbound capability."

[[environment]]
name = "MAP_TILE_PROVIDER"
kind = "choice"
required_modes = ["live"]
allowed_values = ["maptiler"]
redaction = "public"
description = "Named raster tile provider profile."

[[environment]]
name = "MAP_TILE_SATELLITE_TEMPLATE"
kind = "text"
required_modes = ["live"]
redaction = "public"
description = "Capability-bound HTTPS satellite raster URL template."

[[environment]]
name = "MAP_TILE_STREETS_TEMPLATE"
kind = "text"
required_modes = ["live"]
redaction = "public"
description = "Capability-bound HTTPS streets raster URL template."

[[environment]]
name = "MAP_TILE_PUBLIC_KEY"
kind = "text"
required_modes = ["live"]
redaction = "sensitive"
description = "Provider key exposed only through the bounded raster capability."

[[environment]]
name = "SESSION_SIGNING_SECRET_REF"
kind = "secret_ref"
required_modes = ["live"]
redaction = "reference"
description = "Host-vault reference for the session signing secret."

[[environment]]
name = "ADMIN_OPERATOR_ID"
kind = "text"
required_modes = ["live"]
redaction = "public"
description = "Exact operator identity accepted by the Boon Admin contract."

[[environment]]
name = "ADMIN_OPERATOR_SECRET_REF"
kind = "secret_ref"
required_modes = ["live"]
redaction = "reference"
description = "Host-vault reference for the operator verifier secret."

[[environment]]
name = "ADMIN_DEMO_ACCESS"
kind = "bool"
default = "false"
redaction = "public"
description = "Explicit opt-in for bounded read-only demo Admin access."

[[environment]]
name = "TRUSTED_PROXY_CIDRS"
kind = "cidr_list"
default = ""
redaction = "public"
description = "Comma-separated proxy networks allowed to supply trusted forwarding metadata."

[[environment]]
name = "RUST_LOG"
kind = "text"
default = "info"
redaction = "public"
description = "Bounded host diagnostics filter; sensitive values remain redacted."
