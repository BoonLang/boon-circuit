        journey:
          oneOf:
            - $ref: '#/components/schemas/JourneySnapshot'
            - type: 'null'
        upcomingStops:
          type: array
          maxItems: 1000
          items: { $ref: '#/components/schemas/StopCall' }
      allOf:
        - if:
            type: object
            properties:
              vehicle:
                type: object
                required: [passengerServiceState]
                properties:
                  passengerServiceState: { const: non_passenger }
            required: [vehicle]
          then:
            type: object
            properties:
              journey: { type: 'null' }
              upcomingStops: { type: array, maxItems: 0 }
      additionalProperties: false
    VehicleResponse:
      type: object
      required: [ok, data, meta]
      properties:
        ok: { const: true }
        data: { $ref: '#/components/schemas/VehicleData' }
        meta: { $ref: '#/components/schemas/SuccessMeta' }
      additionalProperties: false
    RealtimeTokenData:
      type: object
      required: [token, expiresAt, webSocketUrl, protocolVersion]
      properties:
        token: { type: string, minLength: 20, maxLength: 4096, writeOnly: true }
        expiresAt: { type: string, format: date-time }
        webSocketUrl: { type: string, format: uri, pattern: '^wss?://' }
        protocolVersion: { const: 1 }
      additionalProperties: false
    RealtimeTokenResponse:
      type: object
      required: [ok, data, meta]
      properties:
        ok: { const: true }
        data: { $ref: '#/components/schemas/RealtimeTokenData' }
        meta: { $ref: '#/components/schemas/SuccessMeta' }
      additionalProperties: false
    AdminLoginRequest:
      type: object
      required: [username, password]
      properties:
        username: { type: string, minLength: 1, maxLength: 200 }
        password: { type: string, minLength: 1, maxLength: 1024, writeOnly: true }
      additionalProperties: false
    AdminDemoCredentialsData:
      oneOf:
        - type: object
          required: [enabled]
          properties:
            enabled: { const: false }
          additionalProperties: false
        - type: object
          required: [enabled, username, password]
          properties:
            enabled: { const: true }
            username: { type: string, minLength: 1, maxLength: 200 }
            password:
              type: string
              minLength: 1
              maxLength: 1024
              description: Intentionally public demo password; never the operator password.
          additionalProperties: false
    AdminDemoCredentialsResponse:
      type: object
      required: [ok, data, meta]
      properties:
        ok: { const: true }
        data: { $ref: '#/components/schemas/AdminDemoCredentialsData' }
        meta: { $ref: '#/components/schemas/SuccessMeta' }
      additionalProperties: false
    AdminSessionData:
      type: object
      required: [authenticated, username, access, expiresAt]
      properties:
        authenticated: { const: true }
        username: { type: string, minLength: 1, maxLength: 200 }
        access:
          type: string
          enum: [operator, demo]
          description: Informational session role; server-side middleware remains the authorization boundary.
        expiresAt: { type: string, format: date-time }
      additionalProperties: false
    AdminSessionResponse:
      type: object
      required: [ok, data, meta]
      properties:
        ok: { const: true }
        data: { $ref: '#/components/schemas/AdminSessionData' }
        meta: { $ref: '#/components/schemas/SuccessMeta' }
      additionalProperties: false
    MetricsSummary:
      type: object
      required: [activeClients, stationWatches, vehicleWatches, focusWatches, messagesPerMinute]
      properties:
        activeClients:
          type: integer
          minimum: 0
          description: Open browser WebSocket connections reported by a fresh realtime heartbeat; zero when the heartbeat is missing or stale.
        stationWatches: { type: integer, minimum: 0 }
        vehicleWatches: { type: integer, minimum: 0 }
        focusWatches: { type: integer, minimum: 0 }
        messagesPerMinute:
          type: number
          minimum: 0
          description: WebSocket messages received from browsers plus messages successfully delivered to browsers during the rolling previous 60 seconds; this is not a process-lifetime average and is zero when the realtime heartbeat is missing or stale.
      additionalProperties: false
    EnturBudget:
      type: object
      description: FjordPulse's internal rolling request-safety budget. This is not an allowance or quota reported by Entur.
      required: [service, limit, remaining, windowSeconds, backoffUntil]
      properties:
        service:
          description: The shared aggregate budget when `global`, otherwise the budget for one backend Entur adapter.
          oneOf:
            - { const: global }
            - { $ref: '#/components/schemas/EnturService' }
        limit:
          type: integer
          minimum: 0
          description: Maximum outbound attempts FjordPulse permits within the rolling window.
        remaining:
          type: integer
          minimum: 0
          description: Current estimated headroom in FjordPulse's rolling window, derived from backend request history rather than an Entur response.
        windowSeconds:
          type: integer
          minimum: 1
          description: Rolling-window duration. Because the window rolls per request, it has no single reset timestamp.
        backoffUntil:
          type: [string, 'null']
          format: date-time
          description: Latest future retry time recorded for this service, or for any service on the global row; null when no recorded backoff is active.
      additionalProperties: false
    RealtimeEventType:
      type: string
      enum:
        - station_snapshot_changed
        - vehicle_moved
        - vehicle_stale
        - vehicle_lost
    RealtimeEventRow:
      type: object
      required: [eventId, type, scope, entityId, version, source, payload, createdAt]
      properties:
        eventId: { type: string, minLength: 1, maxLength: 200 }
        type: { $ref: '#/components/schemas/RealtimeEventType' }
        scope: { type: string, minLength: 1, maxLength: 256 }
        entityId: { type: string, minLength: 1, maxLength: 200 }
        version: { $ref: '#/components/schemas/EntityVersion' }
        source: { type: string, enum: [station_snapshot, current_vehicle] }
        payload:
          type: object
          additionalProperties: true
        createdAt: { type: string, format: date-time }
      additionalProperties: false
    HostResourceSnapshot:
      type: object
      description: Point-in-time host or container resource measurements collected by the protected backend endpoint.
      required: [checkedAt, cpu, memory, disk]
      properties:
        checkedAt: { type: string, format: date-time }
        cpu:
          type: object
          required: [usagePercent, load1, load5, load15, logicalCores]
          properties:
            usagePercent: { type: [number, 'null'], minimum: 0, maximum: 100 }
            load1: { type: [number, 'null'], minimum: 0 }
            load5: { type: [number, 'null'], minimum: 0 }
            load15: { type: [number, 'null'], minimum: 0 }
            logicalCores: { type: [integer, 'null'], minimum: 1 }
          additionalProperties: false
        memory:
          type: object
          required: [totalBytes, availableBytes, usedBytes, usedPercent, scope]
          properties:
            totalBytes: { type: [integer, 'null'], minimum: 0 }
            availableBytes: { type: [integer, 'null'], minimum: 0 }
            usedBytes: { type: [integer, 'null'], minimum: 0 }
            usedPercent: { type: [number, 'null'], minimum: 0, maximum: 100 }
            scope: { type: string, enum: [host, cgroup] }
          additionalProperties: false
        disk:
          type: object
          required: [path, totalBytes, freeBytes, usedBytes, usedPercent]
          properties:
            path: { type: string, minLength: 1, maxLength: 4096 }
            totalBytes: { type: [integer, 'null'], minimum: 0 }
            freeBytes: { type: [integer, 'null'], minimum: 0 }
            usedBytes: { type: [integer, 'null'], minimum: 0 }
            usedPercent: { type: [number, 'null'], minimum: 0, maximum: 100 }
          additionalProperties: false
      additionalProperties: false
    AdminStatusData:
      type: object
      required: [build, database, resources, services, metrics, dataCounts, stationImport, enturBudgets, recentEvents]
      properties:
        build:
          type: object
          required: [version, environment, dataMode]
          properties:
            version: { type: string, minLength: 1, maxLength: 128 }
            environment: { type: string, enum: [local, development, test, staging, production] }
            dataMode: { type: string, enum: [fake, real] }
          additionalProperties: false
        database:
          type: object
          description: Protected, credential-free identity of the configured authoritative database target.
          required: [engine, endpointOrigin, namespace, name, warning]
          properties:
            engine: { type: string, const: surrealdb }
            endpointOrigin:
              type: string
              format: uri
              pattern: '^wss?://[^/@?#]+$'
              maxLength: 512
              description: WebSocket origin only; credentials, RPC path, query, and fragment are omitted.
            namespace: { type: string, minLength: 1, maxLength: 200 }
            name: { type: string, minLength: 1, maxLength: 200 }
            warning:
              type: [string, 'null']
              maxLength: 500
              description: Configuration warning, including staging or production loopback targets, or null.
          additionalProperties: false
        resources: { $ref: '#/components/schemas/HostResourceSnapshot' }
        services:
          type: object
          required: [backend, realtime, surrealdb, entur, liveQueryBridge, mapTiles]
          properties:
            backend: { $ref: '#/components/schemas/ServiceHealth' }
            realtime: { $ref: '#/components/schemas/ServiceHealth' }
            surrealdb: { $ref: '#/components/schemas/ServiceHealth' }
            entur: { $ref: '#/components/schemas/ServiceHealth' }
            liveQueryBridge: { $ref: '#/components/schemas/ServiceHealth' }
            mapTiles: { $ref: '#/components/schemas/ServiceHealth' }
          additionalProperties: false
        metrics: { $ref: '#/components/schemas/MetricsSummary' }
        dataCounts:
          type: object
          required: [stations, stationSnapshots, stationTimetables, currentVehicles, journeySnapshots, vehicleObservations, watches, realtimeEvents, enturRequestLogs]
          properties:
            stations: { type: integer, minimum: 0 }
            stationSnapshots: { type: integer, minimum: 0 }
            stationTimetables: { type: integer, minimum: 0 }
            currentVehicles: { type: integer, minimum: 0 }
            journeySnapshots: { type: integer, minimum: 0 }
            vehicleObservations: { type: integer, minimum: 0 }
            watches: { type: integer, minimum: 0 }
            realtimeEvents: { type: integer, minimum: 0 }
            enturRequestLogs: { type: integer, minimum: 0 }
          additionalProperties: false
        stationImport:
          type: object
          required: [count, lastImportedAt, sourceVersion]
          properties:
            count: { type: integer, minimum: 0 }
            lastImportedAt: { type: [string, 'null'], format: date-time }
            sourceVersion: { type: [string, 'null'], maxLength: 200 }
          additionalProperties: false
        enturBudgets:
          type: array
          description: The global rolling budget followed by the four service-specific rolling budgets enforced by FjordPulse.
          minItems: 5
          maxItems: 5
          items: { $ref: '#/components/schemas/EnturBudget' }
        recentEvents:
          type: array
          description: Bounded compatibility field retained for admin consumers; `/api/admin/events` is the authoritative detailed event log and System status does not render this preview.
          maxItems: 5
          items: { $ref: '#/components/schemas/RealtimeEventRow' }
      additionalProperties: false
    AdminStatusResponse:
      type: object
      required: [ok, data, meta]
      properties:
        ok: { const: true }
        data: { $ref: '#/components/schemas/AdminStatusData' }
        meta: { $ref: '#/components/schemas/SuccessMeta' }
      additionalProperties: false
    WatchType:
      type: string
      enum: [station, vehicle, focus]
    WatchState:
      type: string
      enum: [active, stale, backoff, failed, expired]
    WatchPriority:
      type: string
      enum: [background, station, selected_vehicle, focus]
    WatchRow:
      type: object
      required: [id, type, scope, entityId, clientCount, priority, state, lastRefreshAt, nextRefreshAt, expiresAt]
      properties:
        id: { type: string, minLength: 1, maxLength: 200 }
        type: { $ref: '#/components/schemas/WatchType' }
        scope: { type: string, minLength: 1, maxLength: 256 }
        entityId: { type: string, minLength: 1, maxLength: 200 }
        clientCount: { type: integer, minimum: 0 }
        priority: { $ref: '#/components/schemas/WatchPriority' }
        state: { $ref: '#/components/schemas/WatchState' }
        lastRefreshAt: { type: [string, 'null'], format: date-time }
        nextRefreshAt: { type: [string, 'null'], format: date-time }
        expiresAt: { type: string, format: date-time }
        lastErrorCode: { type: [string, 'null'], maxLength: 100 }
      additionalProperties: false
    AdminWatchesData:
      type: object
      required: [summary, watches]
      properties:
        summary:
          type: object
          required: [total, focus, expiringSoon, failed]
          properties:
            total: { type: integer, minimum: 0 }
            focus: { type: integer, minimum: 0 }
            expiringSoon: { type: integer, minimum: 0 }
            failed: { type: integer, minimum: 0 }
          additionalProperties: false
        watches:
          type: array
          items: { $ref: '#/components/schemas/WatchRow' }
      additionalProperties: false
    AdminWatchesResponse:
      type: object
      required: [ok, data, meta]
      properties:
        ok: { const: true }
        data: { $ref: '#/components/schemas/AdminWatchesData' }
        meta: { $ref: '#/components/schemas/SuccessMeta' }
      additionalProperties: false
    EnturService:
      type: string
      enum: [stop_place_register, geocoder, journey_planner, vehicle_positions]
    EnturOutcome:
      type: string
      enum: [success, cache_hit, skipped_budget, rate_limited, backoff, timeout, error]
    CacheStatus:
      type: string
      enum: [hit, miss, bypassed, stale]
    EnturLogRow:
      type: object
      required: [id, requestedAt, service, scope, outcome, httpStatus, latencyMs, itemCount, cache, retryAt, requestId]
      properties:
        id: { type: string, minLength: 1, maxLength: 200 }
        requestedAt: { type: string, format: date-time }
        service: { $ref: '#/components/schemas/EnturService' }
        scope: { type: string, minLength: 1, maxLength: 256 }
        outcome: { $ref: '#/components/schemas/EnturOutcome' }
        httpStatus: { type: [integer, 'null'], minimum: 100, maximum: 599 }
        latencyMs: { type: [number, 'null'], minimum: 0 }
        itemCount: { type: [integer, 'null'], minimum: 0 }
        cache: { $ref: '#/components/schemas/CacheStatus' }
        retryAt: { type: [string, 'null'], format: date-time }
        requestId: { $ref: '#/components/schemas/RequestId' }
        errorCode: { type: [string, 'null'], maxLength: 100 }
      additionalProperties: false
    AdminEnturLogData:
      type: object
      required: [metrics, entries]
      properties:
        metrics:
          type: object
          required: [requestsPerMinute, cacheHitRate, p95LatencyMs, inBackoff]
          properties:
            requestsPerMinute:
              type: number
              minimum: 0
              description: Actual outbound Entur transport attempts recorded during the previous 60 seconds from a separately database-filtered sample; cache hits and calls skipped by FjordPulse's internal budget or active backoff are excluded.
            cacheHitRate:
              type: number
              minimum: 0
              maximum: 1
              description: Cache-hit share among up to 1,000 matching rows in the server metric sample, before the display-entry limit is applied.
            p95LatencyMs:
              type: [number, 'null']
              minimum: 0
              description: Nearest-rank p95 latency among up to 1,000 actual outbound Entur attempts matching the server filters; null when there were none.
            inBackoff:
              type: boolean
              description: True only while at least one matching database log row has a retry deadline later than the response time.
          additionalProperties: false
        entries:
          type: array
          items: { $ref: '#/components/schemas/EnturLogRow' }
      additionalProperties: false
    AdminEnturLogResponse:
      type: object
      required: [ok, data, meta]
      properties:
        ok: { const: true }
        data: { $ref: '#/components/schemas/AdminEnturLogData' }
        meta: { $ref: '#/components/schemas/SuccessMeta' }
      additionalProperties: false
    AdminRealtimeData:
      type: object
      required: [server, liveQueryBridge, activeClients, rooms, messagesPerMinute, reconnectCount, failureCount, lastBroadcastAt]
      properties:
        server: { $ref: '#/components/schemas/ServiceHealth' }
        liveQueryBridge: { $ref: '#/components/schemas/ServiceHealth' }
        activeClients:
          type: integer
          minimum: 0
          description: Open browser WebSocket connections reported by a fresh realtime heartbeat; zero when the heartbeat is missing or stale.
        rooms:
          type: array
          items:
            type: object
            required: [scope, clientCount]
            properties:
              scope: { type: string, minLength: 1, maxLength: 256 }
              clientCount: { type: integer, minimum: 0 }
            additionalProperties: false
        messagesPerMinute:
          type: number
          minimum: 0
          description: WebSocket messages received from browsers plus messages successfully delivered to browsers during the rolling previous 60 seconds; zero when the realtime heartbeat is missing or stale.
        reconnectCount:
          type: integer
          minimum: 0
          description: Successful SurrealDB live-query bridge recoveries since the realtime process started; this is not a browser reconnect count and is zero when the heartbeat is missing or stale.
        failureCount:
          type: integer
          minimum: 0
          description: Live-query bridge failures plus failed WebSocket deliveries since the realtime process started; zero when the heartbeat is missing or stale.
        lastBroadcastAt:
          type: [string, 'null']
          format: date-time
          description: Time of the latest room or all-client broadcast delivered to at least one browser; null when no broadcast has reached a browser in this process or the heartbeat is missing or stale.
      additionalProperties: false
    AdminRealtimeResponse:
      type: object
      required: [ok, data, meta]
      properties:
        ok: { const: true }
        data: { $ref: '#/components/schemas/AdminRealtimeData' }
        meta: { $ref: '#/components/schemas/SuccessMeta' }
      additionalProperties: false
    AdminEventsData:
      type: object
      required: [events]
      properties:
        events:
          type: array
          items: { $ref: '#/components/schemas/RealtimeEventRow' }
      additionalProperties: false
    AdminEventsResponse:
      type: object
      required: [ok, data, meta]
      properties:
        ok: { const: true }
        data: { $ref: '#/components/schemas/AdminEventsData' }
        meta: { $ref: '#/components/schemas/SuccessMeta' }
      additionalProperties: false
    DatabasePermissionMode:
      type: string
      description: |
        Normalized permission meaning. `conditional` indicates that SurrealDB
        has an expression which is intentionally not evaluated by the browser.
      enum: [full, none, conditional]
    DatabaseTablePermissions:
      type: object
      required: [select, create, update, delete]
      properties:
        select: { $ref: '#/components/schemas/DatabasePermissionMode' }
        create: { $ref: '#/components/schemas/DatabasePermissionMode' }
        update: { $ref: '#/components/schemas/DatabasePermissionMode' }
        delete: { $ref: '#/components/schemas/DatabasePermissionMode' }
      additionalProperties: false
    DatabaseFieldPermissions:
      type: object
      required: [select, create, update]
      properties:
        select: { $ref: '#/components/schemas/DatabasePermissionMode' }
        create: { $ref: '#/components/schemas/DatabasePermissionMode' }
        update: { $ref: '#/components/schemas/DatabasePermissionMode' }
      additionalProperties: false
    DatabaseSchemaField:
      type: object
      required: [name, type, readonly, assertion, defaultValue, computedValue, valueExpression, referenceOnDelete, permissions]
      properties:
        name: { type: string, minLength: 1, maxLength: 300 }
        type: { type: string, minLength: 1, maxLength: 1000 }
        readonly: { type: boolean }
        assertion: { type: [string, 'null'], maxLength: 10000 }
        defaultValue: { type: [string, 'null'], maxLength: 10000 }
        computedValue: { type: [string, 'null'], maxLength: 10000 }
        valueExpression: { type: [string, 'null'], maxLength: 10000 }
        referenceOnDelete: { type: [string, 'null'], maxLength: 100 }
        permissions: { $ref: '#/components/schemas/DatabaseFieldPermissions' }
      additionalProperties: false
    DatabaseSchemaIndex:
      type: object
      required: [name, fields, unique, mode]
      properties:
        name: { type: string, minLength: 1, maxLength: 300 }
        fields:
          type: array
          items: { type: string, minLength: 1, maxLength: 300 }
        unique: { type: boolean }
        mode: { type: [string, 'null'], maxLength: 1000 }
      additionalProperties: false
    DatabaseSchemaEvent:
      type: object
      required: [name, condition, actions]
      properties:
        name: { type: string, minLength: 1, maxLength: 300 }
        condition: { type: [string, 'null'], maxLength: 20000 }
        actions:
          type: array
          items: { type: string, minLength: 1, maxLength: 20000 }
      additionalProperties: false
    DatabaseSchemaTable:
      type: object
      required: [name, kind, schemaMode, permissions, fields, indexes, events]
      properties:
        name: { type: string, minLength: 1, maxLength: 300 }
        kind:
          type: string
          enum: [normal, relation, any]
        schemaMode:
          type: string
          enum: [schemafull, schemaless]
        permissions: { $ref: '#/components/schemas/DatabaseTablePermissions' }
        fields:
          type: array
          items: { $ref: '#/components/schemas/DatabaseSchemaField' }
        indexes:
          type: array
          items: { $ref: '#/components/schemas/DatabaseSchemaIndex' }
        events:
          type: array
          items: { $ref: '#/components/schemas/DatabaseSchemaEvent' }
      additionalProperties: false
    AdminDatabaseSchemaData:
      type: object
      required: [readOnly, checkedAt, tables]
      properties:
        readOnly: { const: true }
        checkedAt: { type: string, format: date-time }
        tables:
          type: array
          items: { $ref: '#/components/schemas/DatabaseSchemaTable' }
      additionalProperties: false
    AdminDatabaseSchemaResponse:
      type: object
      required: [ok, data, meta]
      properties:
        ok: { const: true }
        data: { $ref: '#/components/schemas/AdminDatabaseSchemaData' }
        meta: { $ref: '#/components/schemas/SuccessMeta' }
      additionalProperties: false
    DatabaseMigrationState:
      type: string
      enum: [applied, pending, checksum_mismatch, orphaned, failed]
    DatabaseMigrationCompatibilityState:
      type: string
      enum: [in_sync, pending, drift, failed]
    DatabaseMigrationAffectedObject:
      type: object
      required: [kind, name, table, operation]
      properties:
        kind:
          type: string
          enum: [table, field, index, event]
        name: { type: string, minLength: 1, maxLength: 300 }
        table: { type: [string, 'null'], minLength: 1, maxLength: 300 }
        operation:
          type: string
          enum: [define, remove, rebuild]
      additionalProperties: false
    DatabaseMigration:
      type: object
      required:
        - name
        - description
        - state
        - releaseChecksum
        - databaseChecksum
        - appliedAt
        - lastAttemptedAt
        - failureMessage
        - source
        - affectedObjects
      properties:
        name: { type: string, minLength: 1, maxLength: 300 }
        description: { type: string, maxLength: 2000 }
        state: { $ref: '#/components/schemas/DatabaseMigrationState' }
        releaseChecksum: { type: [string, 'null'], minLength: 1, maxLength: 128 }
        databaseChecksum: { type: [string, 'null'], minLength: 1, maxLength: 128 }
        appliedAt: { type: [string, 'null'], format: date-time }
        lastAttemptedAt: { type: [string, 'null'], format: date-time }
        failureMessage: { type: [string, 'null'], maxLength: 2000 }
        source:
          type: [string, 'null']
          maxLength: 250000
          description: Read-only content of the discovered bundled release migration; never an arbitrary filesystem path.
        affectedObjects:
          type: array
          items: { $ref: '#/components/schemas/DatabaseMigrationAffectedObject' }
      additionalProperties: false
    DatabaseMigrationCounts:
      type: object
      required: [applied, pending, checksumMismatch, orphaned, failed]
      properties:
        applied: { type: integer, minimum: 0 }
        pending: { type: integer, minimum: 0 }
        checksumMismatch: { type: integer, minimum: 0 }
        orphaned: { type: integer, minimum: 0 }
        failed: { type: integer, minimum: 0 }
      additionalProperties: false
    AdminDatabaseMigrationsData:
      type: object
      required: [readOnly, checkedAt, state, counts, lastAppliedAt, migrations]
      properties:
        readOnly: { const: true }
        checkedAt: { type: string, format: date-time }
        state: { $ref: '#/components/schemas/DatabaseMigrationCompatibilityState' }
        counts: { $ref: '#/components/schemas/DatabaseMigrationCounts' }
        lastAppliedAt: { type: [string, 'null'], format: date-time }
        migrations:
          type: array
          items: { $ref: '#/components/schemas/DatabaseMigration' }
      additionalProperties: false
    AdminDatabaseMigrationsResponse:
      type: object
      required: [ok, data, meta]
      properties:
        ok: { const: true }
        data: { $ref: '#/components/schemas/AdminDatabaseMigrationsData' }
        meta: { $ref: '#/components/schemas/SuccessMeta' }
      additionalProperties: false
    DevScenario:
      type: string
      enum:
        - normal
        - station_empty
        - station_stale
        - station_error
        - vehicle_live
        - vehicle_stale
        - vehicle_lost
        - fallback
        - entur_backoff
        - realtime_reconnect
    DevScenarioData:
      type: object
      required: [scenario, activatedAt]
      properties:
        scenario: { $ref: '#/components/schemas/DevScenario' }
        activatedAt: { type: string, format: date-time }
      additionalProperties: false
    DevScenarioResponse:
      type: object
      required: [ok, data, meta]
      properties:
        ok: { const: true }
        data: { $ref: '#/components/schemas/DevScenarioData' }
        meta: { $ref: '#/components/schemas/SuccessMeta' }
      additionalProperties: false
    DevScenariosData:
      type: object
      required: [scenarios]
      properties:
        scenarios:
          type: array
          minItems: 10
          maxItems: 10
          uniqueItems: true
          items: { $ref: '#/components/schemas/DevScenario' }
      additionalProperties: false
    DevScenariosResponse:
      type: object
      required: [ok, data, meta]
      properties:
        ok: { const: true }
        data: { $ref: '#/components/schemas/DevScenariosData' }
        meta: { $ref: '#/components/schemas/SuccessMeta' }
      additionalProperties: false
