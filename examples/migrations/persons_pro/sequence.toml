initial_stage = "v1"
launch_stage = "v3"
test_driver = "example"
scenario = "examples/migrations/persons_pro/migration.scn"

[[stage]]
id = "v1"
label = "Persons.pro Local Workspace V1"
schema_version = 1
source = "examples/migrations/persons_pro/v1/RUN.bn"
