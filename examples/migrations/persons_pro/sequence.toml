source = "examples/persons_pro/RUN.bn"
source_files = [
  "examples/persons_pro/Model/Workspace.bn",
  "examples/persons_pro/Model/Account.bn",
  "examples/persons_pro/Templates/Profile.bn",
  "examples/persons_pro/Templates/ProfilePage.bn",
  "examples/persons_pro/Theme/PersonsTheme.bn",
  "examples/persons_pro/View/Components.bn",
  "examples/persons_pro/View/Editor.bn",
  "examples/persons_pro/View/Preview.bn",
  "examples/persons_pro/View/Auth.bn",
  "examples/persons_pro/View/Publish.bn",
  "examples/persons_pro/View/Shell.bn",
  "examples/persons_pro/App.bn",
  "examples/persons_pro/RUN.bn",
]
